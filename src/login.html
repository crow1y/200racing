<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar – 200 Racing</title>
<link rel="stylesheet" href="css/global.css">
<style>
body { min-height: 100vh; display: flex; flex-direction: column; }
.login-page {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}
.login-left {
  background: var(--dark); display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 60px 64px;
  position: relative; overflow: hidden;
}
.login-left::before {
  content: '200'; position: absolute;
  font-family: var(--font-display); font-size: 50vw; color: rgba(255,255,255,.012);
  line-height: 1; pointer-events: none; left: -10%;
}
.login-box { width: 100%; max-width: 420px; position: relative; z-index: 1; }
.login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 48px; }
.login-logo img { width: 54px; height: 54px; object-fit: contain; border-radius: 50%; }
.login-logo-brand { font-family: var(--font-display); font-size: 26px; letter-spacing: 3px; }
.login-logo-brand span { color: var(--red); }
.login-title { font-family: var(--font-display); font-size: 52px; letter-spacing: 1px; line-height: .9; margin-bottom: 8px; }
.login-title span { color: var(--red); }
.login-sub { font-size: 14px; font-weight: 300; color: var(--grey); margin-bottom: 48px; line-height: 1.6; }

.login-divider {
  display: flex; align-items: center; gap: 16px;
  font-family: var(--font-cond); font-size: 10px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; color: var(--grey);
  margin: 28px 0;
}
.login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

.btn-google {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 16px; background: var(--panel); border: 1px solid var(--border2);
  color: var(--white); cursor: pointer;
  font-family: var(--font-cond); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  transition: all .2s; margin-bottom: 14px;
}
.btn-google:hover { border-color: #4285F4; color: var(--white); background: var(--panel2); }
.btn-google svg { flex-shrink: 0; }

.tab-btns { display: flex; gap: 0; margin-bottom: 32px; border: 1px solid var(--border2); }
.tab-btn {
  flex: 1; padding: 12px; background: none;
  font-family: var(--font-cond); font-size: 12px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; color: var(--grey);
  border: none; cursor: pointer; transition: all .2s;
}
.tab-btn.active { background: var(--red); color: var(--white); }

.form-submit {
  width: 100%; padding: 15px; background: var(--red); color: var(--white); border: none;
  font-family: var(--font-cond); font-size: 13px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
  transition: background .2s; margin-top: 8px;
}
.form-submit:hover { background: #c01015; }
.form-submit:disabled { background: var(--border2); color: var(--grey); cursor: not-allowed; }

.form-error { color: var(--red); font-size: 12px; font-family: var(--font-cond); letter-spacing: 1px; margin-top: 12px; display: none; }
.form-error.visible { display: block; }

.login-right {
  background: var(--black); position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.login-right-bg {
  position: absolute; inset: 0; background: var(--dark);
}
.login-right-img {
  width: 100%; height: 100%; object-fit: cover; object-position: center;
  filter: contrast(1.05) saturate(1.1) brightness(.75);
}
.login-right-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to left, transparent 40%, var(--black) 100%),
              linear-gradient(to top, var(--black) 0%, transparent 50%);
}
.login-right-text {
  position: absolute; bottom: 48px; left: 48px; z-index: 2;
}
.login-right-text h2 { font-family: var(--font-display); font-size: 44px; letter-spacing: 1px; line-height: .95; margin-bottom: 12px; }
.login-right-text h2 span { color: var(--red); }
.login-right-text p { font-size: 13px; font-weight: 300; color: var(--lgrey); max-width: 300px; line-height: 1.6; }

@media (max-width: 768px) {
  .login-page { grid-template-columns: 1fr; }
  .login-right { display: none; }
  .login-left { padding: 40px 28px; min-height: 100vh; }
}
</style>
</head>

<script src="js/shared.js"></script>
<script type="module">
import {
  auth, loginWithGoogle, onAuthStateChanged, getCurrentUserRole,
  db, doc, setDoc, serverTimestamp
} from './js/firebase-config.js';
import {
  createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Redirect if already logged in
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const role = await getCurrentUserRole(user.uid);
    window.location.href = role === 'admin' ? 'admin.html' : (localStorage.getItem('redirect_after_login') || 'loja.html');
  }
});

window.switchTab = function(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none' : 'block';
};

window.signInGoogle = async function() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true; btn.textContent = 'Aguarde...';
  try {
    await loginWithGoogle();
    showToast('Login realizado com sucesso!', 'success');
  } catch(e) {
    showToast('Erro ao fazer login com Google', 'error');
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48">...</svg> Continuar com Google`;
  }
};

window.signInEmail = async function() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.remove('visible');
  if (!email || !password) { errEl.textContent = 'Preencha todos os campos.'; errEl.classList.add('visible'); return; }
  btn.disabled = true; btn.textContent = 'Aguarde...';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Usuário não encontrado.',
      'auth/wrong-password': 'Senha incorreta.',
      'auth/invalid-email': 'E-mail inválido.',
      'auth/too-many-requests': 'Muitas tentativas. Tente mais tarde.'
    };
    errEl.textContent = msgs[e.code] || 'Erro ao fazer login.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Entrar →';
  }
};

window.registerEmail = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  const btn = document.getElementById('reg-btn');
  errEl.classList.remove('visible');
  if (!name || !email || !password) { errEl.textContent = 'Preencha todos os campos.'; errEl.classList.add('visible'); return; }
  if (password.length < 6) { errEl.textContent = 'Senha deve ter pelo menos 6 caracteres.'; errEl.classList.add('visible'); return; }
  btn.disabled = true; btn.textContent = 'Criando conta...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, role: 'customer', createdAt: serverTimestamp()
    });
    showToast('Conta criada com sucesso!', 'success');
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'Este e-mail já está cadastrado.',
      'auth/weak-password': 'Senha muito fraca.',
      'auth/invalid-email': 'E-mail inválido.'
    };
    errEl.textContent = msgs[e.code] || 'Erro ao criar conta.';
    errEl.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Criar Conta →';
  }
};
</script>
